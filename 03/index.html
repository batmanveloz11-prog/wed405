<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figuras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="fondo">
    <div class="container">
        <h1 class="text-center text-light my-3">Figuras</h1>
        <div class="row">
            <div class="col">
                <table>
                    <tr>
                        <td colspan="2"><h2>ANCHO</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="ancho" min="10" max="500" value="50"></td>
                        <td class="w-50 text-center"><h1 id="vancho">50</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>ALTO</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="alto" min="10" max="500" value="50"></td>
                        <td class="w-50 text-center"><h1 id="valto">50</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>COLOR DE RELLENO</h2></td>
                    </tr>
                    <tr>
                        <td colspan="2"><input type="color" class="form-control" id="color"></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>RADIOS</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="radius" min="0" max="100" value="0"></td>
                        <td class="w-50 text-center"><h1 id="vradio">0</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>ANCHO BORDE</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="anchoborde" min="0" max="100" value="5"></td>
                        <td class="w-50 text-center"><h1 id="vanchoborde">5</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>TIPO DE BORDE</h2></td>
                    </tr>
                    <tr>
                        <td colspan="2" class="w-50">
                            <select id="tipoborde" class="form-control">
                                <option value="solid">Solid</option>
                                <option value="dashed">Dashed</option>
                                <option value="dotted">Dotted</option>
                                <option value="double">Double</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>COLOR DE BORDE</h2></td>
                    </tr>
                    <tr>
                        <td colspan="2"><input type="color" class="form-control" id="colorborde"></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>COLOR DE SOMBRA</h2></td>
                    </tr>
                    <tr>
                        <td colspan="2"><input type="color" class="form-control" id="colorsombra"></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>DESPLAZAMIENTO SOMBRA VERTICAL</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="ejeY" min="-50" max="50" value="0"></td>
                        <td class="w-50 text-center"><h1 id="vejeY">0</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>DESPLAZAMIENTO SOMBRA HORIZONTAL</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="ejeX" min="-50" max="50" value="0"></td>
                        <td class="w-50 text-center"><h1 id="vejeX">0</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>DESENFOQUE SOMBRA</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="blur" min="0" max="100" value="0"></td>
                        <td class="w-50 text-center"><h1 id="vblur">0</h1></td>
                    </tr>
                    <tr>
                        <td colspan="2"><h2>TAMAÑO SOMBRA</h2></td>
                    </tr>
                    <tr>
                        <td class="w-50"><input type="range" class="form-control" id="spread" min="-50" max="50" value="0"></td>
                        <td class="w-50 text-center"><h1 id="vspread">0</h1></td>
                    </tr>
                </table>
            </div>
            <div class="col centrar">
                <div id="figura">

                </div>
            </div>
            
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
