<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="fondo">
    <div class="container">
        <h1 class="text-center text-light my-3">Calculadora</h1>
        <table border width="100%" class="table table-dark table-striped">
            <tr>
                <td colspan="2"><h1>Numero 1</h1></td>
            </tr>
            <tr>
                <td class="w-50"><input type="range" class="form-control w-75 m-auto" id="num1" min="1" max="100" value="1"></td>
                <td><h2 id="vnum1" class="text-center">1</h2></td>
            </tr>
            <tr>
                <td colspan="2"><h1>Numero 2</h1></td>
            </tr>
            <tr>
                <td class="w-50"><input type="range" class="form-control w-75 m-auto" id="num2" min="1" max="100" value="1"></td>
                <td><h2 id="vnum2" class="text-center">1</h2></td>
            </tr>
            <tr>
                <td class="py-3">
                    <button class="btn btn-danger w-100" onclick="suma()">suma</button>
                </td>
                <td class="py-3">
                    <button class="btn btn-danger w-100" onclick="resta()">resta</button>
                </td>
            </tr>
            <tr>
                <td class="py-3">
                    <button class="btn btn-danger w-100" onclick="multiplicacion()">Multiplicacion</button>
                </td>
                <td class="py-3">
                    <button class="btn btn-danger w-100" onclick="division()">Division</button>
                </td>
            </tr>
             <tr>
                <td colspan="2" class="py-3">
                    <button class="btn btn-danger w-100" onclick="borrar()">Borrar</button>
                </td>
            </tr>
            <tr>
                <td colspan="2" class="text-center my-5"><h1 class="my-5" id="res">Resultado</h1></td>
            </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
